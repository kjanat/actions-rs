name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Pure-std crate: one runner is enough for the static gates. OS-sensitive
  # behaviour (env-file newlines, the RandomState delimiter) is covered by the
  # unit/integration tests, which run here.
  check:
    name: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with: { components: "clippy, rustfmt" }
      - run: cargo fmt --check
      - run: cargo test --all-targets --all-features
      - run: cargo test --doc
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  # Does our protocol output round-trip through the *real* runner's
  # environment files? The check is written in Rust (examples/ci_selfcheck.rs)
  # so there is no shell, no `${{ }}` interpolation, and it is identical on
  # every OS. Run on Linux + Windows because env-file path/newline handling is
  # the only genuinely platform-sensitive surface.
  roundtrip:
    name: round-trip (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo run --quiet --example ci_selfcheck
