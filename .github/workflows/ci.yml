name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# `run:` is unavoidably a shell. Pin it to bash everywhere so it is never
# the runner-default (which would be pwsh on Windows) — deterministic, and
# every `run:` here is a single bare `cargo` command, no script logic.
defaults:
  run:
    shell: bash

jobs:
  # Pure-std crate: one runner is enough for the static gates. OS-sensitive
  # behaviour (env-file newlines, the RandomState delimiter) is covered by the
  # unit/integration tests, which run here.
  check:
    name: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with: { components: "clippy, rustfmt" }
      - run: cargo fmt --check
      - run: cargo test --all-targets --all-features
      - run: cargo test --doc
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  # Does our protocol output round-trip through the *real* runner's
  # environment files? Written in Rust (examples/ci_selfcheck.rs): no shell,
  # no `${{ }}`. Ubuntu only — the crate has no platform-specific code
  # (env-file writes hardcode `\n`, no path/OS branching), so Windows would
  # cost 2x minutes for zero extra signal.
  roundtrip:
    name: round-trip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo run --quiet --example ci_selfcheck
