name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions: { contents: read }
defaults: { run: { shell: bash } }

jobs:
  check:
    name: check
    runs-on: ubuntu-latest
    steps:
      - { uses: actions/checkout@v6 }
      - { uses: kjanat/runner@master, with: { version: latest } }
      - { uses: dtolnay/rust-toolchain@stable, with: { components: "clippy, rustfmt" } }
      - run: run fmt-check
      - run: run test-all
      - run: run doc-test
      - run: run clippy-strict
      - run: rustup run nightly -- run doc-nightly

  roundtrip:
    name: round-trip
    runs-on: ubuntu-latest
    steps:
      - { uses: actions/checkout@v6 }
      - { uses: kjanat/runner@master, with: { version: latest } }
      - { uses: dtolnay/rust-toolchain@stable }
      - { run: run selfcheck, shell: bash }
      - { run: run selfcheck, shell: pwsh }
