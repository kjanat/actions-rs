name: crates-release
run-name: "${{ format('{0}crates publish {1}', case(inputs.dry-run == true, 'dry: ', ''), case(github.event_name == 'workflow_dispatch', inputs.tag, github.ref_name)) }}"
on:
  push: { tags: [v*] }
  workflow_dispatch:
    inputs:
      tag: { description: Release tag to publish (e.g. v0.6.0), required: true, type: string }
      dry-run: { description: Dry run only (no upload to crates.io), required: false, default: false, type: boolean }
permissions: { contents: read }
env: { CARGO_TERM_COLOR: always }
defaults: { run: { shell: bash } }
jobs:
  publish:
    name: publish to crates.io
    runs-on: ubuntu-latest
    permissions: { contents: read, id-token: write }
    environment: { name: crates-io, url: "${{ format('https://crates.io/crates/{0}/{1}', steps.meta.outputs.name, steps.meta.outputs.version) }}" }
    env:
      RELEASE_TAG: ${{ case(github.event_name == 'workflow_dispatch', inputs.tag, github.ref_name) }}
      INPUT_DRY_RUN: ${{ inputs.dry-run || 'false' }}
    steps:
      - uses: actions/checkout@v6
        with: { ref: "refs/tags/${{ env.RELEASE_TAG }}", persist-credentials: false }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: verify tag matches Cargo.toml version
        id: meta
        run: |
          set -euo pipefail
          tag_version="${RELEASE_TAG#v}"
          pkg="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].name')"
          manifest_version=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')

          if [[ "${tag_version}" != "${manifest_version}" ]]; then
            echo "error: tag ${RELEASE_TAG} (${tag_version}) does not match Cargo.toml version ${manifest_version}" >&2
            exit 1
          fi

          echo "ok: tag ${RELEASE_TAG} matches Cargo.toml version ${manifest_version}"

          # do NOT replace the tabs below with spaces... just foreshadowing...
          cat <<-ENV | tee -a "${GITHUB_OUTPUT}"
          	name=${pkg}
          	version=${manifest_version}
          ENV

      - name: cargo publish (dry-run verification)
        run: cargo publish --locked --dry-run

      - name: mint crates.io token (trusted publishing)
        id: auth
        if: env.INPUT_DRY_RUN != 'true'
        uses: rust-lang/crates-io-auth-action@v1

      - name: cargo publish
        if: env.INPUT_DRY_RUN != 'true'
        env: { CARGO_REGISTRY_TOKEN: "${{ steps.auth.outputs.token }}" }
        run: cargo publish --locked
